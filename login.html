<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Вход в систему - Volleyball Scoreboard</title>
    <link href="css/css.css" rel="stylesheet">
    <script src="js/db-config.js"></script>
    <script src="js/db-interface.js"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #225378 0%, #1695A3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #225378;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .login-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }

        .logo {
            max-width: 80px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #225378;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #225378;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #1b415e;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #225378;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #225378;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .role-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        .role-info strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="logo_nvl.png" alt="Volleyball" class="logo" onerror="this.style.display='none'">
            <h1>Volleyball Scoreboard</h1>
            <p>Войдите для продолжения</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginFormElement">
            <div id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="admin" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Войти</button>

                <div class="role-info">
                    <strong>Роли пользователей:</strong>
                    📊 <b>Пользователь</b> - просмотр результатов и управление табло<br>
                    🔧 <b>Администратор</b> - управление пользователями и полный доступ
                </div>
            </div>
        </form>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Вход в систему...</p>
        </div>
    </div>

    <script>
        // Проверка включена ли авторизация
        const isAuthEnabled = (typeof ENABLE_AUTH !== 'undefined') ? ENABLE_AUTH === 1 : true;

        // Проверяем, есть ли redirect на admin.html
        const urlParams = new URLSearchParams(window.location.search);
        const redirectParam = urlParams.get('redirect');
        const isAdminPage = redirectParam && redirectParam.includes('admin.html');

        // Если авторизация отключена и это не admin.html, перенаправляем на главную
        if (!isAuthEnabled && !isAdminPage) {
            window.location.href = 'index.html';
        }

        // Инициализация DB
        const auth = {
            onAuthStateChanged: function(cb) {
                DB.init().then(function() {
                    DB.auth.onAuthStateChanged(cb);
                });
            },
            signInWithEmailAndPassword: async function(email, password) {
                const username = email.split('@')[0];
                const userInfo = await DB.auth.login(username, password);
                return { user: { uid: userInfo.uid, email: userInfo.email, displayName: userInfo.displayName } };
            },
            signOut: function() {
                return DB.auth.logout();
            }
        };

        // Элементы DOM
        let loginFormElement, loginBtn, usernameInput, passwordInput, errorMessage, successMessage, loadingDiv;
        let redirectUrl = null;
        let isLoggingIn = false; // Флаг для предотвращения редиректа во время входа

        // Ждем загрузки DOM
        document.addEventListener('DOMContentLoaded', async () => {
            await DB.init();

            loginFormElement = document.getElementById('loginFormElement');
            loginBtn = document.getElementById('loginBtn');
            usernameInput = document.getElementById('username');
            passwordInput = document.getElementById('password');
            errorMessage = document.getElementById('errorMessage');
            successMessage = document.getElementById('successMessage');
            loadingDiv = document.getElementById('loading');

            // Получаем URL для возврата из query параметра
            const urlParams = new URLSearchParams(window.location.search);
            redirectUrl = urlParams.get('redirect');

            // Проверка: если уже авторизован, перенаправляем
            DB.auth.onAuthStateChanged(async (user) => {
                // Если正在进行 вход, не делаем редирект
                if (isLoggingIn) {
                    console.log('Login in progress, skipping redirect');
                    return;
                }

                if (user) {
                    showLoading();
                    try {
                        // Для admin.html всегда проверяем роль через DB
                        if (isAdminPage) {
                            const username = user.email.split('@')[0];
                            const userData = await DB.users.get(username);

                            let role = 'user';
                            if (userData && userData.role) {
                                role = userData.role === 'admin' ? 'admin' : 'user';
                            }

                            if (role !== 'admin') {
                                hideLoading();
                                showError('Доступ запрещен. Требуются права администратора.');
                                return;
                            }
                        }

                        // Возвращаемся на страницу, с которой пришли
                        if (redirectUrl) {
                            window.location.href = redirectUrl;
                        } else {
                            // Если redirectUrl нет, перенаправляем на index.html
                            window.location.href = 'index.html';
                        }
                    } catch (error) {
                        console.error('Auth error:', error);
                        hideLoading();
                        showError('Ошибка проверки авторизации: ' + error.message);
                    }
                }
            });

            // Обработка формы входа
            loginFormElement.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                if (!username || !password) {
                    showError('Введите имя пользователя и пароль');
                    return;
                }

                showLoading();
                hideError();

                try {
                    // Устанавливаем флаг для предотвращения редиректа
                    isLoggingIn = true;
                    
                    // Генерируем email из username
                    const email = username.toLowerCase() + '@volleyball.local';

                    // Вход через Firebase Auth с email
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Записываем вход в auth_log
                    try {
                        const usernameLower = username.toLowerCase();
                        const loginTime = new Date().toISOString();

                        // Получаем IP-адрес
                        let ipAddress = 'unknown';
                        try {
                            const ipResponse = await fetch('https://api.ipify.org?format=json');
                            const ipData = await ipResponse.json();
                            ipAddress = ipData.ip || 'unknown';
                        } catch (ipErr) {
                            // Не критично, продолжаем без IP
                        }

                        // Записываем в auth_log через DB
                        await DB.auth.logAuthEvent({
                            username: usernameLower,
                            uid: user.uid,
                            email: user.email,
                            loginAt: loginTime,
                            timestamp: loginTime,
                            ipAddress: ipAddress,
                            ip_address: ipAddress,
                            userAgent: navigator.userAgent,
                            user_agent: navigator.userAgent,
                            isAdminPage: isAdminPage
                        });
                    } catch (err) {
                        console.error('Failed to write auth_log:', err);
                    }

                    // Проверяем роль через DB
                    const userData = await DB.users.get(username.toLowerCase());

                    let role = 'user';
                    if (userData && userData.role) {
                        role = userData.role === 'admin' ? 'admin' : 'user';
                    }

                    // Для admin.html проверяем права администратора
                    if (isAdminPage && role !== 'admin') {
                        hideLoading();
                        showError('Доступ запрещен. Требуются права администратора.');
                        await auth.signOut();
                        return;
                    }

                    showSuccess('Успешный вход! Перенаправление...');

                    // Сбрасываем флаг
                    isLoggingIn = false;

                    // Возвращаемся на страницу, с которой пришли
                    setTimeout(() => {
                        if (redirectUrl) {
                            window.location.href = redirectUrl;
                        } else {
                            // Если redirectUrl нет, перенаправляем на index.html
                            window.location.href = 'index.html';
                        }
                    }, 1000);

                } catch (error) {
                    // Сбрасываем флаг при ошибке
                    isLoggingIn = false;
                    hideLoading();
                    console.error('Login error:', error);

                    let errorMsg = error.message || 'Ошибка входа. Проверьте логин и пароль.';
                    // Проверяем код ошибки
                    if (error.code === 'auth/user-not-found') {
                        errorMsg = 'Пользователь не найден';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMsg = 'Неверный пароль';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg = 'Слишком много попыток входа. Попробуйте позже';
                    } else if (error.code === 'auth/user-disabled') {
                        errorMsg = 'Учетная запись заблокирована';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMsg = 'Неверное имя пользователя';
                    } else if (error.code === 'auth/network-request-failed') {
                        errorMsg = 'Ошибка сети. Проверьте интернет-соединение.';
                    } else if (error.code === 'auth/invalid-credential' || error.code === 'INVALID_LOGIN_CREDENTIALS') {
                        // Firebase v9+ использует 'auth/invalid-credential'
                        errorMsg = 'Пользователь не найден или неверный пароль';
                    } else {
                        // Пытаемся извлечь сообщение из JSON ошибки
                        if (error.message && typeof error.message === 'string') {
                            try {
                                const parsed = JSON.parse(error.message);
                                if (parsed.error && parsed.error.message) {
                                    const firebaseMsg = parsed.error.message;
                                    if (firebaseMsg.includes('INVALID_LOGIN_CREDENTIALS') || 
                                        firebaseMsg.includes('USER_NOT_FOUND')) {
                                        errorMsg = 'Пользователь не найден или неверный пароль';
                                    } else if (firebaseMsg.includes('WRONG_PASSWORD')) {
                                        errorMsg = 'Неверный пароль';
                                    }
                                }
                            } catch (e) {
                                // Не JSON, используем стандартное сообщение
                            }
                        }
                    }

                    showError(errorMsg);
                }
            });

            // Вход по Enter
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });

            // Функции
            function showLoading() {
                loginFormElement.style.display = 'none';
                loadingDiv.style.display = 'block';
            }

            function hideLoading() {
                loadingDiv.style.display = 'none';
                loginFormElement.style.display = 'block';
            }

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            }

            function hideError() {
                errorMessage.style.display = 'none';
            }

            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }
        });
    </script>
</body>
</html>
