<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка коллекции scoreusers</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.min.js"></script>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        pre { background: #222; padding: 15px; border-radius: 6px; white-space: pre-wrap; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-size: 14px; margin: 5px; }
        button:hover { background: #0a0; }
        input { padding: 8px; background: #222; color: #0f0; border: 1px solid #0f0; width: 300px; }
        label { display: block; margin: 5px 0; color: #0a0; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <h2>🔍 Структура коллекции scoreusers</h2>
    
    <label>PocketBase URL:
        <input type="text" id="pbUrl" value="http://zago.my.to:8091">
    </label>
    <label>Admin email:
        <input type="text" id="adminEmail" value="supervisor@volleyball.local">
    </label>
    <label>Admin password:
        <input type="password" id="adminPassword" value="Mer1in00">
    </label>
    
    <button onclick="checkCollection()">Проверить</button>
    <button onclick="fixCollection()">Исправить (пересоздать)</button>
    <button onclick="showUsers()">Показать пользователей</button>
    
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        let pb = null;

        async function login() {
            pb = new PocketBase(document.getElementById('pbUrl').value);
            await pb.admins.authWithPassword(
                document.getElementById('adminEmail').value,
                document.getElementById('adminPassword').value
            );
        }

        async function checkCollection() {
            output.innerHTML = '';
            try {
                await login();
                const collectionsData = await pb.collections.getList();
                const collections = Array.isArray(collectionsData) ? collectionsData : (collectionsData.items || []);
                const su = collections.find(c => c.name === 'scoreusers');
                
                if (!su) {
                    output.innerHTML = '<pre class="error">Коллекция scoreusers НЕ НАЙДЕНА!</pre>';
                    return;
                }

                let result = '=== scoreusers ===\n';
                result += 'Тип: ' + su.type + '\n';
                result += 'ID: ' + su.id + '\n\n';
                result += 'Поля (' + su.schema.length + '):\n';
                su.schema.forEach(f => {
                    result += '  - ' + f.name + ' (' + f.type + ') required=' + f.required + ' unique=' + f.unique;
                    if (f.type === 'select' && f.options) {
                        result += ' values=' + JSON.stringify(f.options.values);
                    }
                    result += '\n';
                });
                result += '\nAPI Rules:\n';
                result += '  listRule: ' + su.listRule + '\n';
                result += '  viewRule: ' + su.viewRule + '\n';
                result += '  createRule: ' + su.createRule + '\n';
                result += '  updateRule: ' + su.updateRule + '\n';
                result += '  deleteRule: ' + su.deleteRule + '\n';
                
                if (su.options) {
                    result += '\nAuth Options:\n';
                    result += '  minPasswordLength: ' + su.options.minPasswordLength + '\n';
                    result += '  requireEmail: ' + su.options.requireEmail + '\n';
                    result += '  allowEmailAuth: ' + su.options.allowEmailAuth + '\n';
                    result += '  allowUsernameAuth: ' + su.options.allowUsernameAuth + '\n';
                }
                
                output.innerHTML = '<pre>' + result + '</pre>';
            } catch (e) {
                output.innerHTML = '<pre class="error">Ошибка: ' + e.message + '</pre>';
            }
        }

        async function showUsers() {
            output.innerHTML = '';
            try {
                await login();
                const users = await pb.collection('scoreusers').getFullList({ sort: '+created' });
                let result = 'Пользователи (' + users.length + '):\n\n';
                users.forEach(u => {
                    result += 'id: ' + u.id + '\n';
                    result += '  username: ' + u.username + '\n';
                    result += '  email: ' + u.email + '\n';
                    result += '  name: ' + (u.name || '-') + '\n';
                    result += '  role: ' + (u.role || '-') + '\n';
                    result += '  created: ' + u.created + '\n';
                    result += '\n';
                });
                output.innerHTML = '<pre>' + result + '</pre>';
            } catch (e) {
                output.innerHTML = '<pre class="error">Ошибка: ' + e.message + '</pre>';
            }
        }

        async function fixCollection() {
            if (!confirm('Это УДАЛИТ существующую коллекцию scoreusers и все данные. Продолжить?')) return;
            
            output.innerHTML = '<pre>Удаление...</pre>';
            try {
                await login();
                const collectionsData = await pb.collections.getList();
                const collections = Array.isArray(collectionsData) ? collectionsData : (collectionsData.items || []);
                const su = collections.find(c => c.name === 'scoreusers');
                
                if (su) {
                    await pb.collections.delete(su.id);
                    output.innerHTML += '<pre>✓ Удалена</pre>';
                }

                await pb.collections.create({
                    name: 'scoreusers',
                    type: 'auth',
                    listRule: 'id = @request.auth.id',
                    viewRule: 'id = @request.auth.id',
                    createRule: '',
                    updateRule: 'id = @request.auth.id',
                    deleteRule: null,
                    schema: [
                        { name: 'username', type: 'text', required: true, unique: true, min: 3, max: 50 },
                        { name: 'email', type: 'email', required: true, unique: true },
                        { name: 'name', type: 'text', required: false, max: 100 },
                        { name: 'role', type: 'select', required: false, maxSelect: 1, values: ['admin', 'user', 'moderator'] },
                        { name: 'avatar', type: 'file', required: false, maxSelect: 1, mimeTypes: ['image/jpeg', 'image/png', 'image/gif'], thumbs: ['100x100'] }
                    ],
                    options: {
                        allowEmailAuth: true,
                        allowOAuth2Auth: true,
                        allowUsernameAuth: true,
                        minPasswordLength: 8,
                        requireEmail: true,
                        onlyVerified: false
                    }
                });
                output.innerHTML += '<pre>✓ Создана (auth)</pre>';

                await pb.collection('scoreusers').create({
                    username: 'admin',
                    email: 'admin@volleyball.local',
                    password: 'Ko5yavka',
                    passwordConfirm: 'Ko5yavka',
                    name: 'Admin',
                    role: 'admin',
                    emailVisibility: true
                });
                output.innerHTML += '<pre>✓ Создан пользователь: admin / Ko5yavka</pre>';
                output.innerHTML += '<pre class="error">ГОТОВО! Обновите страницу admin.html</pre>';
            } catch (e) {
                output.innerHTML += '<pre class="error">Ошибка: ' + e.message + '</pre>';
            }
        }
    </script>
</body>
</html>
