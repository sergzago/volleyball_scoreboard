<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тест Firebase Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .log { background: #16213e; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🧪 Тест подключения к Firebase Firestore</h1>
    <div id="controls">
        <button onclick="testFirestore()">Тест Firestore</button>
        <button onclick="testAuth()">Тест Auth</button>
        <button onclick="clearLog()">Очистить лог</button>
    </div>
    <div id="log" class="log"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCezRf1nI1dlLFwDgW8LDcHZ-ocQEBx30",
            authDomain: "myvolleyscore.firebaseapp.com",
            projectId: "myvolleyscore",
            storageBucket: "myvolleyscore.firebasestorage.app",
            messagingSenderId: "102858014506",
            appId: "1:102858014506:web:aa67a16c0c281b06f3e853",
            measurementId: "G-6MQ6ZLE52N"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testAuth() {
            log('=== Тест Auth ===', 'info');
            
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    log(`✅ Авторизован: ${user.email}`, 'success');
                    log(`   UID: ${user.uid}`, 'info');
                    
                    try {
                        await user.getIdToken(true);
                        const idTokenResult = await user.getIdTokenResult();
                        const claims = idTokenResult.claims || {};
                        log(`   Claims: ${JSON.stringify(claims)}`, 'info');
                        log(`   Role: ${claims.admin ? 'ADMIN' : 'USER'}`, 'success');
                    } catch (e) {
                        log(`❌ Ошибка получения claims: ${e.message}`, 'error');
                    }
                } else {
                    log('⚠️ Не авторизован. Войдите через login.html', 'error');
                }
            });
        }

        async function testFirestore() {
            log('=== Тест Firestore ===', 'info');
            
            const user = auth.currentUser;
            if (!user) {
                log('❌ Сначала авторизуйтесь (кнопка "Тест Auth")', 'error');
                return;
            }

            try {
                log('Запрос к коллекции users...', 'info');
                const startTime = Date.now();
                
                const snapshot = await db.collection('users').get();
                
                const duration = Date.now() - startTime;
                log(`✅ Получено за ${duration}мс`, 'success');
                log(`   Документов: ${snapshot.size}`, 'success');
                
                snapshot.forEach(doc => {
                    log(`   📄 ${doc.id}: ${JSON.stringify(doc.data())}`, 'info');
                });
                
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`, 'error');
                log(`   Code: ${error.code}`, 'error');
            }
        }

        log('Страница загружена. Нажмите кнопки для теста.', 'info');
    </script>
</body>
</html>
