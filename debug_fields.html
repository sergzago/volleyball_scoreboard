<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поля коллекции scoreusers</title>
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.min.js"></script>
<style>
body { font-family: monospace; background: #111; color: #0f0; padding: 30px; }
#out { background: #222; padding: 20px; border-radius: 6px; white-space: pre-wrap; margin-top: 15px; }
button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<h2>Структура коллекции scoreusers</h2>
<button onclick="run()">Запустить</button>
<div id="out"></div>
<script>
async function run() {
  const out = document.getElementById('out');
  out.textContent = 'Подключение...';
  
  const pb = new PocketBase('http://zago.my.to:8091');
  
  // Пробуем получить список коллекций (требует авторизации)
  // Для начала просто попробуем войти как обычный пользователь
  try {
    // Пробуем найти пользователя scoreusers публично
    const users = await pb.collection('scoreusers').getFullList({ page: 1, perPage: 5 });
    let info = 'Найдено пользователей: ' + users.length + '\n\n';
    
    if (users.length > 0) {
      const u = users[0];
      info += 'Поля в записи:\n';
      Object.keys(u).forEach(function(key) {
        info += '  - ' + key + ': ' + JSON.stringify(u[key]) + '\n';
      });
    }
    
    out.textContent = info;
  } catch(e) {
    out.textContent = 'Ошибка getFullList: ' + e.message + '\n\nПопробую через API...\n';
    
    // Попробуем получить через fetch напрямую
    const resp = await fetch('http://zago.my.to:8091/api/collections/scoreusers/records?page=1&perPage=1');
    const data = await resp.json();
    out.textContent += '\nAPI Response:\n' + JSON.stringify(data, null, 2);
  }
}
</script>
</body>
</html>
