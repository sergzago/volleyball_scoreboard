<!DOCTYPE html>
<html lang="en"><head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Control scoreboard</title>
    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="credentials.js"></script>
    <script src="js/db-config.js"></script>
    <script src="js/db-interface.js"></script>
    <script src="js/common.js"></script>
    <script src="js/ctl.js"></script>
    <script src="js/auth.js"></script>
    <link href="css/css.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <style>
        .auth-header {
            background: #225378;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .auth-header a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }
        .auth-header a:hover {
            text-decoration: underline;
        }
        /* Стили для заблокированных чекбоксов */
        .checkbox-inline input:disabled {
            cursor: not-allowed;
        }
        .checkbox-inline input:disabled + span {
            opacity: 0.5;
            cursor: not-allowed;
            color: #999;
        }
        .checkbox-inline:has(input:disabled),
        label.checkbox-inline:has(input:disabled) {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* Fallback для браузеров без поддержки :has() */
        .checkbox-inline.disabled-label {
            opacity: 0.6;
            cursor: not-allowed;
            color: #999;
        }
    </style>
    <style>
      .score-row {
        display: flex;
        flex-wrap: nowrap;
        gap: 15px;
        justify-content: space-between;
      }
      .score-row .score-col {
        flex: 1 1 0;
      }
      .score-row .score-col h4 {
        margin-top: 0;
        margin-bottom: 4px;
      }
      @media (max-width: 480px) {
        .score-row {
          gap: 8px;
        }
        .score-row .score-col {
          font-size: 14px;
        }
      }
      .set-history {
        display: none;
        background-color: #fff;
        color: #000;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 4px;
        padding: 4px 14px;
        font-size: 12px;
        min-height: 20px;
        text-align: center;
      }
      .set-history-ctl {
        width: auto;
        font-weight: bold;
        font-size: 18px;
      }
      /* Модальное окно подтверждения завершения матча */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .modal-overlay.hidden,
      .modal-overlay.dialog-hidden {
        display: none;
      }
      .modal-dialog {
        background: #fff;
        border-radius: 8px;
        max-width: 420px;
        width: 90%;
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      }
      .modal-header {
        padding: 16px 20px;
        border-bottom: 1px solid #eee;
      }
      .modal-header h3 {
        margin: 0;
        font-size: 20px;
        color: #333;
      }
      .modal-body {
        padding: 20px;
        font-size: 16px;
        color: #555;
      }
      .modal-footer {
        padding: 12px 20px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .modal-footer .btn {
        min-width: 80px;
      }
      /* Стили для кнопок таймаута */
      .timeout-btn {
        padding-top: 4px;
        font-weight: bold;
        font-size: 15px;
        width: 60px;
        height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="auth-header">
        <span>🏐 Volleyball Scoreboard - Управление табло</span>
        <div>
            <span id="userInfo">Загрузка...</span>
            <a href="admin.html" id="adminLink" style="display:none;" target="_blank">Админ-панель</a>
            <a href="online.html" target="_blank">Результаты</a>
            <a href="#" onclick="AuthModule.logout(); return false;">Выйти</a>
        </div>
    </div>
    <div class="container">
      <div class="row text-center">
        <div class="col-xs-12 col-md-4 hidden">
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Show</h3>
            </div>
            <div class="panel-body">
              <!--input type="checkbox" class="checkbox" id="show"></input-->
              <button data-val="0" class="btn show-select" type="button">нет</button>
              <button data-val="1" class="btn show-select" type="button">верх</button>
              <button data-val="2" class="btn show-select" type="button">низ</button>
              <button data-val="4" class="btn show-select" type="button">верх надпись</button>
              <button data-val="6" class="btn show-select" type="button">верх надпись+низ</button>
              <input id="custom_label" value="Разминка">
              <button class="label-btn btn btn-info" type="button">сохранить</button>
            </div>

          </div>
        </div>
        <div class="col-xs-12 hidden">
          <button class="btn btn-default side-switch-btn" type="button">Смена сторон</button>
          <button class="btn btn-default new-set-btn" type="button" style="margin-left:8px;">Новый сет</button>
        </div>
        <div class="col-xs-12 col-md-8 hidden"> <!-- BEGIN SCORE -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Сет</h3>
            </div>
            <div class="panel-body">
              <div class="row score-row">
                <div class="score-col home-col text-center">
                  <h4 class="home_team">home</h4>
                  <div class="score-field" id="home_score"></div>
                  <button data-team="home" class="score-btn btn btn-default" type="button">-1</button>
                  <button data-team="home" class="score-btn btn btn-info" type="button">+1</button>
                  <br><br>
                  <button data-team="home" class="timeout-btn btn btn-warning" type="button">Т</button>
                </div>
                <div class="score-col away-col text-center">
                  <h4 class="away_team">away</h4>
                  <div class="score-field" id="away_score"></div>
                  <button data-team="away" class="score-btn btn btn-default" type="button">-1</button>
                  <button data-team="away" class="score-btn btn btn-info" type="button">+1</button>
                  <br><br>
                  <button data-team="away" class="timeout-btn btn btn-warning" type="button">Т</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xs-12 col-md-4 hidden"> <!-- BEGIN FOULS -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Счёт</h3>
            </div>
            <div class="panel-body">
              <div class="row score-row">
                <div class="score-col home-col text-center">
                  <h4 class="home_team">home</h4>
                  <span id="home_fouls" class="score-field period-score"></span>
                  <br>
                  <button data-team="home" class="foul-btn btn btn-sm btn-default" type="button">-1</button>
                  <button data-team="home" class="foul-btn btn btn-sm btn-info" type="button">+1</button>
                </div>
                <div class="score-col away-col text-center">
                  <h4 class="away_team">away</h4>
                  <span id="away_fouls" class="score-field period-score"></span>
                  <br>
                  <button data-team="away" class="foul-btn btn btn-sm btn-default" type="button">-1</button>
                  <button data-team="away" class="foul-btn btn btn-sm btn-info" type="button">+1</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xs-12 col-md-4 hidden"> <!-- BEGIN SET HISTORY -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">История сетов</h3>
            </div>
            <div class="panel-body">
              <div id="set-history-ctl" class="set-history set-history-ctl">&nbsp;</div>
            </div>
          </div>
        </div> <!-- END SET HISTORY -->
      </div>
      <div class="row text-center">
        <!-- BEACH MODE block moved below PERIOD block -->
        <div class="col-xs-12 col-md-4 hidden"> <!-- BEGIN PERIOD -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Period</h3>
            </div>
            <div class="panel-body">
              <div class="score-field" id="period"></div>
              <button class="period-btn btn btn-default" type="button">-1</button>
              <button class="period-btn btn btn-info" type="button">+1</button>
            </div>
          </div>
        </div> <!-- END PERIOD -->

        <div class="col-xs-12 col-md-4 hidden"> <!-- BEGIN BEACH MODE -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Режим</h3>
            </div>
            <div class="panel-body">
              <label class="checkbox-inline">
                <input type="checkbox" id="two_wins_mode_toggle">
                <span>До двух побед</span>
              </label>
              <br>
              <label class="checkbox-inline">
                <input type="checkbox" id="beach_mode_toggle">
                <span>Пляжный волейбол</span>
              </label>
              <br>
              <label class="checkbox-inline">
                <input type="checkbox" id="invert_tablo_toggle">
                <span>Инвертировать табло</span>
              </label>
              <br>
              <label class="checkbox-inline">
                <input type="checkbox" id="unlimited_score_toggle">
                <span>Счет без ограничений</span>
              </label>
              <div class="alert alert-success beach-match-status hidden"></div>
            </div>
          </div>
        </div> <!-- END BEACH MODE -->
        <div class="col-xs-12 col-md-4"> <!-- BEGIN HOME -->
          <div class="panel panel-default">
            <div class="panel-heading">
              <h3 class="panel-title">Name</h3>
            </div>
            <div class="panel-body">
              <div class="panel-body">
                <label for="in_tournament">Турнир:</label>
                <input id="in_tournament">
              </div>
              <div class="panel-body">
                <label for="in_venue">Зал:</label>
                <input id="in_venue" placeholder="">
              </div>
              <div class="panel-body">
                <input id="in_home_team" value="Team1">
                <input type="color" id="col_home_team" value="#ff0000" style="width:50%;">
              </div>
              <div class="panel-body">
                <input id="in_away_team" value="Team2">
                <input type="color" id="col_away_team" value="#00ff00" style="width:50%;">
              </div>
              <div class="panel-body">
                <button class="names-btn btn btn-info hidden" type="button">сохранить</button>
                <button class="reset-btn btn btn-info" type="button">сброс</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно подтверждения завершения матча -->
    <div id="matchFinishModal" class="modal-overlay dialog-hidden">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h3>Игра завершена</h3>
          </div>
          <div class="modal-body">
            <p id="matchFinishText">Подтвердите завершение игры?</p>
          </div>
          <div class="modal-footer">
            <button id="matchFinishNo" class="btn btn-warning" type="button">Нет</button>
            <button id="matchFinishYes" class="btn btn-success" type="button">Да</button>
          </div>
        </div>
      </div>
    </div>

    <script>
        // Проверка авторизации при загрузке страницы через AuthModule
        window.addEventListener('DOMContentLoaded', async () => {
            // Сохраняем текущий URL с параметрами для возврата после авторизации
            const currentPath = window.location.pathname + window.location.search;

            try {
                // Используем централизованный AuthModule для проверки
                const isAuthorized = await AuthModule.checkAuth('user', 'login.html?redirect=' + encodeURIComponent(currentPath));

                if (!isAuthorized) {
                    return; // AuthModule сам сделает редирект
                }

                const user = AuthModule.getCurrentUser();
                const role = AuthModule.getCurrentRole();

                if (user) {
                    document.getElementById('userInfo').textContent = user.email + ' (' + (role === 'admin' ? 'Админ' : 'Пользователь') + ')';

                    if (role === 'admin') {
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                }

                // Подписываемся на изменения авторизации через DB
                DB.auth.onAuthStateChanged(async (updatedUser) => {
                    if (!updatedUser) {
                        window.location.href = 'login.html?redirect=' + encodeURIComponent(currentPath);
                        return;
                    }
                    // Обновляем UI
                    const updatedRole = updatedUser.role || 'user';
                    document.getElementById('userInfo').textContent = updatedUser.email + ' (' + (updatedRole === 'admin' ? 'Админ' : 'Пользователь') + ')';
                    if (updatedRole === 'admin') {
                        document.getElementById('adminLink').style.display = 'inline';
                    } else {
                        document.getElementById('adminLink').style.display = 'none';
                    }
                });
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'login.html?redirect=' + encodeURIComponent(currentPath);
            }
        });
    </script>
  </body>
</html>
