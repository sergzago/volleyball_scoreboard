<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>CORS Test</title>
<style>body{font-family:monospace;background:#111;color:#0f0;padding:20px}pre{background:#222;padding:15px;white-space:pre-wrap}</style>
</head>
<body>
<h2>CORS Test - PocketBase 8091</h2>
<button onclick="testCors()">Test CORS</button>
<button onclick="testLogin()">Test Login</button>
<div id="out"></div>
<script>
const out = document.getElementById('out');
function log(m) { out.innerHTML += '<pre>' + m + '</pre>'; }

async function testCors() {
  log('Testing OPTIONS preflight...');
  try {
    const resp = await fetch('http://zago.my.to:8091/api/collections/scoreusers/auth-with-password', {
      method: 'OPTIONS',
      headers: {
        'Origin': location.origin,
        'Access-Control-Request-Method': 'POST',
        'Access-Control-Request-Headers': 'Content-Type'
      }
    });
    log('Status: ' + resp.status);
    log('Allow-Origin: ' + resp.headers.get('access-control-allow-origin'));
    log('Allow-Methods: ' + resp.headers.get('access-control-allow-methods'));
  } catch(e) {
    log('FAIL: ' + e.message);
  }
}

async function testLogin() {
  log('Testing login with admin/Ko5yavka...');
  try {
    const resp = await fetch('http://zago.my.to:8091/api/collections/scoreusers/auth-with-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Origin': location.origin },
      body: JSON.stringify({ identity: 'admin', password: 'Ko5yavka' })
    });
    log('Status: ' + resp.status);
    const data = await resp.json();
    log('Response: ' + JSON.stringify(data, null, 2));
  } catch(e) {
    log('FAIL: ' + e.message);
  }
}
</script>
</body>
</html>
